services:

  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: always
    env_file:
      - ./provision/open-webui.env
      - path: ./provision/open-webui.prod.env
        required: false
    ports:
      - "8080:8080"
    volumes:
      - ./volumes/open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
