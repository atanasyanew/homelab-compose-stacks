services:

  diyhue:
    container_name: diyhue
    image: diyhue/core:latest
    restart: unless-stopped
    env_file:
      - ./provision/diyhue.env
    volumes:
      - ./volumes/diyhue/config:/opt/hue-emulator/export
    ports:
      - "80:80"
      - "443:443"
      - "1900:1900/udp"
      - "1982:1982/udp"
      - "2100:2100/udp"
