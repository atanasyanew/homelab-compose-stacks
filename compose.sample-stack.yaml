name: sample-stack

include:
  - ./compose.homebridge.yaml
  - ./compose.esphome.yaml
  - ./compose.mosquitto.yaml

services:
  homebridge:
    # Base env always loads first; prod env is optional and only overrides matching keys.
    env_file: !override
      - ./provision/homebridge.env
      - path: ./provision/homebridge.prod.env
        required: false
