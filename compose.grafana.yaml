services:

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file:
      - ./provision/grafana.env
      - path: ./provision/grafana.prod.env
        required: false
    volumes:
      - ./volumes/grafana/data:/var/lib/grafana
    ports:
      - "3000:3000"
